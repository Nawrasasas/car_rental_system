<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <ul id="vehicle_suggestions" style="border:1px solid #ccc; max-width:200px;"></ul>
    <button type="submit">Save Rental</button>
</form>

<script>
const input = document.getElementById('vehicle_number_input');
const suggestions = document.getElementById('vehicle_suggestions');

input.addEventListener('input', function() {
    const query = this.value;
    if(query.length >= 2){
        fetch(`/vehicles-autocomplete/?q=${query}`)
        .then(response => response.json())
        .then(data => {
            suggestions.innerHTML = '';
            data.forEach(vehicle => {
                const li = document.createElement('li');
                li.textContent = vehicle.number;
                li.style.cursor = 'pointer';
                li.addEventListener('click', () => {
                    input.value = vehicle.number;
                    suggestions.innerHTML = '';
                });
                suggestions.appendChild(li);
            });
        });
    } else {
        suggestions.innerHTML = '';
    }
});
</script>
