<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logo Preview Test</title>
    <style>
        .header-main {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            border-bottom: 3px solid #333;
        }
        .logo-img {
            max-height: 60px; /* حجم مناسب للطباعة */
            width: auto;
        }
        .divider {
            width: 2px;
            height: 50px;
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="header-main">
        <img src="sixt_logo.png" alt="Sixt Agency" class="logo-img">
        
        <div class="divider"></div>
        
        <img src="muhanad_logo.png" alt="Muhanad Group" class="logo-img">
    </div>

    <p style="margin-top: 20px; color: #666;">
        If you see both logos above, the alignment is correct for the contract.
    </p>

</body>
</html>
